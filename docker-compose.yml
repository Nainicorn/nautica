services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DB_URL: sqlite:////app/data/nautica.db
      UPLOADS_DIR: /app/uploads
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    env_file:
      - .env
